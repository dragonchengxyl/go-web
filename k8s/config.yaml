apiVersion: v1
kind: ConfigMap
metadata:
  name: studio-config
data:
  database.host: "postgres-service"
  database.port: "5432"
  database.name: "studio_platform"
  redis.host: "redis-service"
  redis.port: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: studio-secrets
type: Opaque
stringData:
  database.user: "postgres"
  database.password: "CHANGE_ME"
  redis.password: "CHANGE_ME"
  jwt.secret: "CHANGE_ME"
