version: '3.8'

services:
  # PostgreSQL Primary
  postgres-primary:
    image: postgres:16-alpine
    container_name: studio-postgres-primary
    environment:
      POSTGRES_DB: studio_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - studio-network

  # Redis with persistence
  redis:
    image: redis:7-alpine
    container_name: studio-redis
    command: redis-server /usr/local/etc/redis/redis.conf
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
      - ./configs/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - studio-network

  # Application (multiple replicas for HA)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    environment:
      SERVER_PORT: 8080
      SERVER_MODE: release
      DATABASE_HOST: postgres-primary
      DATABASE_PORT: 5432
      DATABASE_NAME: studio_platform
      DATABASE_USER: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - studio-network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: studio-nginx
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - studio-network

  # Backup service (runs daily)
  backup:
    image: postgres:16-alpine
    container_name: studio-backup
    environment:
      BACKUP_DIR: /backups
      DB_HOST: postgres-primary
      DB_PORT: 5432
      DB_NAME: studio_platform
      DB_USER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD}
      RETENTION_DAYS: 30
    volumes:
      - backup-data:/backups
      - ./scripts/backup_postgres.sh:/usr/local/bin/backup.sh:ro
    entrypoint: /bin/sh
    command: -c "while true; do /usr/local/bin/backup.sh; sleep 86400; done"
    depends_on:
      - postgres-primary
    restart: unless-stopped
    networks:
      - studio-network

volumes:
  postgres-primary-data:
    driver: local
  redis-data:
    driver: local
  backup-data:
    driver: local

networks:
  studio-network:
    driver: bridge
