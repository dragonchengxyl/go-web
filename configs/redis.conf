# Redis Configuration for High Availability and Persistence

# Enable AOF (Append Only File) persistence
appendonly yes
appendfilename "appendonly.aof"

# AOF fsync policy: everysec (good balance between performance and durability)
# Options: always, everysec, no
appendfsync everysec

# Enable RDB snapshots
save 900 1      # Save if at least 1 key changed in 900 seconds (15 minutes)
save 300 10     # Save if at least 10 keys changed in 300 seconds (5 minutes)
save 60 10000   # Save if at least 10000 keys changed in 60 seconds (1 minute)

# RDB file name
dbfilename dump.rdb

# Directory for persistence files
dir /data

# Enable RDB compression
rdbcompression yes
rdbchecksum yes

# AOF rewrite configuration
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory management
maxmemory 2gb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile /var/log/redis/redis.log

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Security
requirepass ${REDIS_PASSWORD}

# Replication (for slave nodes)
# masterauth ${REDIS_MASTER_PASSWORD}
# replicaof ${REDIS_MASTER_HOST} ${REDIS_MASTER_PORT}

# Sentinel configuration (if using Redis Sentinel)
# sentinel monitor mymaster ${REDIS_MASTER_HOST} ${REDIS_MASTER_PORT} 2
# sentinel down-after-milliseconds mymaster 5000
# sentinel parallel-syncs mymaster 1
# sentinel failover-timeout mymaster 10000

# Performance tuning
slowlog-log-slower-than 10000
slowlog-max-len 128

# Disable dangerous commands in production
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command CONFIG ""
