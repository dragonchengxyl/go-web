server:
  port: 8080
  mode: debug
  allow_origins:
    - http://localhost:3000
    - http://localhost:8080

database:
  dsn: postgres://studio:password@localhost:5432/studio_db?sslmode=prefer
  max_conns: 20
  min_conns: 5

redis:
  addr: localhost:6379
  password: ""
  db: 0

jwt:
  secret: your-secret-key-change-in-production
  access_expiry: 15m
  refresh_expiry: 720h

oss:
  provider: aliyun
  access_key_id: ""
  access_key_secret: ""
  bucket: ""
  endpoint: ""
  region: ""

ratelimit:
  unauthenticated: 60
  authenticated: 200
  admin: 1000
