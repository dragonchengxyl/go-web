# ============================================================
# Base configuration — sensible defaults, NO environment-specific
# credentials or localhost addresses.
#
# Override per environment:
#   Local dev  → configs/config.local.yaml  (gitignored, created from .example)
#   Production → STUDIO_* environment variables (injected by CI/infra)
#
# Precedence (highest wins):
#   STUDIO_* env vars > config.local.yaml > config.yaml
# ============================================================

server:
  port: 8080
  mode: release
  allow_origins: []  # Set via STUDIO_SERVER_ALLOW_ORIGINS or config.local.yaml
  frontend_url: ""   # Optional: password-reset links will use this URL when set

database:
  dsn: ""            # Required: set via STUDIO_DATABASE_DSN or config.local.yaml
  max_conns: 20
  min_conns: 5

redis:
  addr: ""           # Required: set via STUDIO_REDIS_ADDR or config.local.yaml
  password: ""
  db: 0

jwt:
  secret: ""         # Required: set via STUDIO_JWT_SECRET or config.local.yaml
  access_expiry: 15m
  refresh_expiry: 720h

oss:
  provider: aliyun   # "aliyun" or "r2"
  access_key_id: ""
  access_key_secret: ""
  bucket: ""
  endpoint: ""
  region: ""
  allowed_hosts: []

ratelimit:
  unauthenticated: 60
  authenticated: 200
  admin: 1000

email:
  host: ""
  port: 587
  username: ""
  password: ""
  from: ""

moderation:
  access_key_id: ""
  access_key_secret: ""
  endpoint: green-cip.cn-shanghai.aliyuncs.com

sponsor:
  monthly_goal: 500
  current_raised: 0
  alipay_qr_url: ""
  wechat_qr_url: ""
  message: "感谢支持 Furry 社区的运营！"

grpc:
  stats_addr: ""          # empty = local mode; "localhost:50051" = gRPC mode
  notification_addr: ""
  moderation_addr: ""
  stats_port: 50051
  notification_port: 50052
  moderation_port: 50053
