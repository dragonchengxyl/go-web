name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 600s
          script: |
            set -e
            cd /opt/furry-app

            echo "📦 拉取最新代码..."
            git pull origin main

            echo "🔨 编译后端..."
            export PATH=$PATH:/usr/local/go/bin
            go build -o bin/server ./cmd/server
            systemctl restart furry-backend
            sleep 2
            curl -sf http://localhost:8080/health > /dev/null && echo "✓ 后端运行正常"

            echo "🎨 编译前端..."
            cd apps/web
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart furry-web

            echo "✅ 部署完成！"
