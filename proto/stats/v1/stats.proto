syntax = "proto3";
package stats.v1;
option go_package = "github.com/studio/platform/proto/stats/v1;statsv1";
import "proto/common/v1/common.proto";

message DashboardStats {
  int64 total_users = 1;
  int64 new_users_today = 2;
  int64 total_posts = 3;
  int64 total_reports = 4;
}

message ChartRequest {
  int32 days = 1;
}

message ChartPoint {
  string date = 1;
  double value = 2;
}

service StatsService {
  rpc GetDashboardStats(common.v1.Empty) returns (DashboardStats);
  rpc StreamUserGrowth(ChartRequest) returns (stream ChartPoint);
}
